<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>B4ND — Big Four No Dread</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
    --bench: #6366f1;
    --squat: #22c55e;
    --ohp: #f97316;
    --deadlift: #ef4444;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 8px;
  }
  .refresh-btn {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .refresh-btn:hover { border-color: var(--accent); }

  /* Next Workout Hero */
  .next-workout {
    background: linear-gradient(135deg, #1a1d27 0%, #1e2235 100%);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
    position: relative;
    overflow: hidden;
  }
  .next-workout::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 3px;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .next-workout .nw-header {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 16px;
  }
  .next-workout h2 { font-size: 18px; font-weight: 700; }
  .next-workout h2 .emoji { margin-right: 8px; }
  .nw-date {
    font-size: 13px;
    color: var(--accent2);
    font-weight: 600;
    background: rgba(34, 211, 238, 0.1);
    padding: 4px 12px;
    border-radius: 20px;
  }
  .nw-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(140px, 1fr));
    gap: 16px;
  }
  .nw-item .nw-label {
    font-size: 11px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 4px;
  }
  .nw-item .nw-value {
    font-size: 20px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .nw-item .nw-detail {
    font-size: 12px;
    color: var(--muted);
    margin-top: 2px;
  }
  .lift-color-bench { color: var(--bench); }
  .lift-color-squat { color: var(--squat); }
  .lift-color-ohp { color: var(--ohp); }
  .lift-color-deadlift { color: var(--deadlift); }

  /* Stat Cards */
  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .detail {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }

  /* 1000 lb Club */
  .club-tracker {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .club-tracker h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .club-total {
    font-size: 48px;
    font-weight: 800;
    font-variant-numeric: tabular-nums;
    margin-bottom: 8px;
  }
  .club-total small { font-size: 20px; color: var(--muted); font-weight: 400; }
  .club-bar-container {
    background: var(--bg);
    border-radius: 8px;
    height: 12px;
    overflow: hidden;
    margin: 12px 0;
    position: relative;
  }
  .club-bar {
    height: 100%;
    border-radius: 8px;
    transition: width 0.8s ease;
    background: linear-gradient(90deg, var(--accent), var(--accent2));
  }
  .club-lifts {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 12px;
    margin-top: 16px;
  }
  .club-lift {
    text-align: center;
    padding: 12px;
    background: var(--bg);
    border-radius: 8px;
  }
  .club-lift .cl-name { font-size: 11px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 4px; }
  .club-lift .cl-weight { font-size: 24px; font-weight: 700; font-variant-numeric: tabular-nums; }
  .club-lift .cl-unit { font-size: 12px; color: var(--muted); }

  /* Charts */
  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; height: 250px; }

  /* Table */
  .recent-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
    overflow-x: auto;
  }
  .recent-table h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th {
    text-align: left;
    color: var(--muted);
    font-weight: 500;
    padding: 8px 12px;
    border-bottom: 1px solid var(--border);
    text-transform: uppercase;
    font-size: 11px;
    letter-spacing: 0.5px;
  }
  td {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-variant-numeric: tabular-nums;
  }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(99, 102, 241, 0.05); }

  /* Rotation */
  .rotation-section {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 24px;
    margin-bottom: 24px;
  }
  .rotation-section h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .rotation-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
  }
  .rotation-col h4 {
    font-size: 13px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 12px;
  }
  .rotation-item {
    display: flex;
    align-items: center;
    padding: 8px 12px;
    border-radius: 8px;
    margin-bottom: 4px;
    font-size: 13px;
  }
  .rotation-item.current {
    background: rgba(99, 102, 241, 0.15);
    border: 1px solid rgba(99, 102, 241, 0.3);
  }
  .rotation-item.next {
    background: rgba(34, 211, 238, 0.1);
    border: 1px solid rgba(34, 211, 238, 0.2);
  }
  .rotation-item.done { color: var(--muted); }
  .rotation-dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    margin-right: 10px;
    flex-shrink: 0;
  }
  .rotation-dot.done { background: var(--muted); }
  .rotation-dot.current { background: var(--accent); }
  .rotation-dot.next { background: var(--accent2); }
  .rotation-tag {
    font-size: 10px;
    padding: 2px 6px;
    border-radius: 4px;
    margin-left: auto;
    font-weight: 600;
  }
  .rotation-tag.last { background: rgba(99, 102, 241, 0.2); color: var(--accent); }
  .rotation-tag.next { background: rgba(34, 211, 238, 0.2); color: var(--accent2); }

  .loading {
    text-align: center;
    padding: 60px;
    color: var(--muted);
    font-size: 16px;
  }
  .loading .spinner {
    display: inline-block;
    width: 32px;
    height: 32px;
    border: 3px solid var(--border);
    border-top-color: var(--accent);
    border-radius: 50%;
    animation: spin 0.8s linear infinite;
    margin-bottom: 12px;
  }
  @keyframes spin { to { transform: rotate(360deg); } }

  .lift-badge {
    display: inline-block;
    padding: 2px 8px;
    border-radius: 4px;
    font-size: 12px;
    font-weight: 600;
  }
  .lift-badge.bench { background: rgba(99, 102, 241, 0.15); color: var(--bench); }
  .lift-badge.squat { background: rgba(34, 197, 94, 0.15); color: var(--squat); }
  .lift-badge.ohp { background: rgba(249, 115, 22, 0.15); color: var(--ohp); }
  .lift-badge.deadlift { background: rgba(239, 68, 68, 0.15); color: var(--deadlift); }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
    .club-lifts { grid-template-columns: repeat(2, 1fr); }
    .rotation-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .grid { grid-template-columns: 1fr; }
    .nw-grid { grid-template-columns: repeat(2, 1fr); }
    .club-lifts { grid-template-columns: repeat(2, 1fr); }
  }
</style>
</head>
<body>

<div style="text-align:right;margin-bottom:8px">
  <button class="refresh-btn" onclick="loadAll()">↻ Refresh</button>
</div>

<div id="content">
  <div class="loading">
    <div class="spinner"></div>
    <div>Loading workout data…</div>
  </div>
</div>

<script>
// State
let workouts = [];
let program = {};
let charts = {};

const LIFT_COLORS = {
  'Bench Press': '#6366f1',
  'Squat': '#22c55e',
  'Overhead Press': '#f97316',
  'Deadlift': '#ef4444'
};

const LIFT_SHORT = {
  'Bench Press': 'Bench',
  'Squat': 'Squat',
  'Overhead Press': 'OHP',
  'Deadlift': 'Deadlift'
};

const LIFT_CLASS = {
  'Bench Press': 'bench',
  'Squat': 'squat',
  'Overhead Press': 'ohp',
  'Deadlift': 'deadlift'
};

function liftBadge(lift) {
  const cls = LIFT_CLASS[lift] || '';
  const short = LIFT_SHORT[lift] || lift;
  return `<span class="lift-badge ${cls}">${short}</span>`;
}

function liftColorClass(lift) {
  return 'lift-color-' + (LIFT_CLASS[lift] || '');
}

async function loadAll() {
  try {
    // Load data files, schedule, and program in parallel
    const [fileList, programResp] = await Promise.all([
      fetch('/fitness-data/index.json').then(r => r.json()),
      fetch('/program.json').then(r => r.json())
    ]);

    program = programResp;

    const files = fileList.filter(f => f.endsWith('.json'));
    const promises = files.map(f => fetch(`/fitness-data/${f}`).then(r => r.json()).catch(() => null));
    const results = await Promise.all(promises);
    workouts = results.filter(Boolean).sort((a, b) => a.date.localeCompare(b.date));

    render();
  } catch (e) {
    console.error('Load error:', e);
    document.getElementById('content').innerHTML = `
      <div class="loading">
        <div style="font-size:32px;margin-bottom:12px">⚠️</div>
        <div>Failed to load data</div>
        <div style="font-size:13px;color:var(--muted);margin-top:8px">${e.message}</div>
      </div>`;
  }
}

function render() {
  const html = `
    ${renderNextWorkout()}
    ${renderStats()}
    ${renderClubTracker()}
    <div class="charts-grid">
      ${renderChartCard('Bench Press')}
      ${renderChartCard('Squat')}
      ${renderChartCard('Overhead Press')}
      ${renderChartCard('Deadlift')}
    </div>
    ${renderRecentTable()}
    ${renderRotation()}
  `;
  document.getElementById('content').innerHTML = html;
  
  // Init charts after DOM is ready
  requestAnimationFrame(() => {
    initChart('Bench Press');
    initChart('Squat');
    initChart('Overhead Press');
    initChart('Deadlift');
  });
}

// --- Dynamic Rotation Engine ---
function getNextWorkout(personKey) {
  const p = program[personKey];
  if (!p) return null;

  const last = p.lastCompleted;
  const nextMainIdx = (last.mainIndex + 1) % p.mainRotation.length;
  const nextAccIdx = (last.accessoryIndex + 1) % p.accessories.length;
  const nextFinIdx = (last.finisherIndex + 1) % p.finishers.length;

  const mainLift = p.mainRotation[nextMainIdx];
  const topWeight = p.currentWeights[mainLift] || 0;
  const backoffWeight = Math.round(topWeight * (p.protocol.backoffPct || 0.8) * 10) / 10;
  const acc = p.accessories[nextAccIdx];
  const fin = p.finishers[nextFinIdx];

  return {
    person: p.name,
    inventory: p.inventory,
    mainLift,
    topWeight,
    backoffWeight,
    accessory: acc.name,
    accessoryWeight: acc.weight || '—',
    accessoryReps: acc.reps || p.protocol.accessorySets,
    finisher: fin.name,
    finisherWeight: fin.weight || '—',
    finisherReps: fin.reps || p.protocol.finisherSets,
    indices: { main: nextMainIdx, acc: nextAccIdx, fin: nextFinIdx }
  };
}

function warmupUrl(lift, weight, inventory) {
  const base = program.warmupCalculator?.base || 'https://ddonathan.github.io/ddonathan/warmup-calculator/index.html';
  return `${base}?lift1=${encodeURIComponent(lift)}&weight1=${weight}&inventory=${inventory || 'advanced'}`;
}

function renderPersonWorkout(next) {
  if (!next) return '';
  const colorClass = liftColorClass(next.mainLift);
  const wUrl = warmupUrl(next.mainLift, next.topWeight, next.inventory);
  const emoji = next.person === 'Dan' ? '🏋️' : '💪';

  return `
    <div style="flex:1;min-width:280px">
      <h3 style="font-size:14px;color:var(--muted);text-transform:uppercase;letter-spacing:0.5px;margin-bottom:12px">${emoji} ${next.person}</h3>
      <div class="nw-grid">
        <div class="nw-item">
          <div class="nw-label">Main Lift</div>
          <div class="nw-value ${colorClass}">${LIFT_SHORT[next.mainLift] || next.mainLift}</div>
          <div class="nw-detail">${next.person === 'Dan' ? '1×8 top + 2×12 backoff' : '1×8 top + 2×12 backoff'}</div>
        </div>
        <div class="nw-item">
          <div class="nw-label">Top Weight</div>
          <div class="nw-value"><a href="${wUrl}" target="_blank" style="color:var(--accent2);text-decoration:none">${next.topWeight}<small style="font-size:12px;color:var(--muted)"> lbs</small></a></div>
          <div class="nw-detail"><a href="${wUrl}" target="_blank" style="color:var(--muted);font-size:12px">🔗 Warmup Calculator →</a></div>
        </div>
        <div class="nw-item">
          <div class="nw-label">Backoff Weight</div>
          <div class="nw-value">${next.backoffWeight}<small style="font-size:12px;color:var(--muted)"> lbs</small></div>
        </div>
        <div class="nw-item">
          <div class="nw-label">Accessory</div>
          <div class="nw-value" style="font-size:16px">${next.accessory}</div>
          <div class="nw-detail">${next.accessoryWeight} · ${next.accessoryReps}</div>
        </div>
        <div class="nw-item">
          <div class="nw-label">Finisher</div>
          <div class="nw-value" style="font-size:16px">${next.finisher}</div>
          <div class="nw-detail">${next.finisherWeight} · ${next.finisherReps}</div>
        </div>
      </div>
    </div>`;
}

function renderNextWorkout() {
  const danNext = getNextWorkout('dan');
  const ewaNext = getNextWorkout('ewa');

  if (!danNext && !ewaNext) return '';

  return `
    <div class="next-workout">
      <div class="nw-header">
        <h2><span class="emoji">🎯</span> Next Workout</h2>
        <div class="nw-date">Based on rotation</div>
      </div>
      <div style="display:flex;gap:32px;flex-wrap:wrap">
        ${danNext ? renderPersonWorkout(danNext) : ''}
        ${ewaNext ? renderPersonWorkout(ewaNext) : ''}
      </div>
    </div>`;
}

// --- Stats ---
function renderStats() {
  const total = workouts.length;
  
  // Workouts this week
  const now = new Date();
  const startOfWeek = new Date(now);
  startOfWeek.setDate(now.getDate() - now.getDay());
  startOfWeek.setHours(0, 0, 0, 0);
  const thisWeek = workouts.filter(w => new Date(w.date) >= startOfWeek).length;

  // Days since last workout
  const lastDate = workouts.length ? new Date(workouts[workouts.length - 1].date) : null;
  const daysSince = lastDate ? Math.floor((now - lastDate) / 86400000) : '—';

  // Streak: consecutive weeks with 3+ workouts
  const weekMap = {};
  workouts.forEach(w => {
    const d = new Date(w.date);
    // ISO week key
    const jan1 = new Date(d.getFullYear(), 0, 1);
    const weekNum = Math.ceil(((d - jan1) / 86400000 + jan1.getDay() + 1) / 7);
    const key = `${d.getFullYear()}-W${weekNum}`;
    weekMap[key] = (weekMap[key] || 0) + 1;
  });
  
  const weekKeys = Object.keys(weekMap).sort();
  let streak = 0;
  for (let i = weekKeys.length - 1; i >= 0; i--) {
    if (weekMap[weekKeys[i]] >= 3) streak++;
    else break;
  }

  return `
    <div class="grid">
      <div class="stat-card">
        <div class="label">Total Workouts</div>
        <div class="value">${total}</div>
        <div class="detail">Since ${workouts.length ? workouts[0].date : '—'}</div>
      </div>
      <div class="stat-card">
        <div class="label">This Week</div>
        <div class="value">${thisWeek}</div>
        <div class="detail">Target: 3–4 per week</div>
      </div>
      <div class="stat-card">
        <div class="label">Week Streak</div>
        <div class="value">${streak}<small style="font-size:14px;color:var(--muted)"> wks</small></div>
        <div class="detail">Consecutive weeks ≥3 workouts</div>
      </div>
      <div class="stat-card">
        <div class="label">Days Since Last</div>
        <div class="value">${daysSince}</div>
        <div class="detail">${lastDate ? 'Last: ' + workouts[workouts.length - 1].date : 'No workouts logged'}</div>
      </div>
    </div>`;
}

// --- 1000 lb Club ---
function renderClubTracker() {
  const lifts = ['Bench Press', 'Squat', 'Overhead Press', 'Deadlift'];
  const bests = {};
  
  // Find most recent top weight for each lift
  lifts.forEach(lift => {
    for (let i = workouts.length - 1; i >= 0; i--) {
      if (workouts[i].workout.mainLift === lift) {
        bests[lift] = workouts[i].workout.topWeight;
        break;
      }
    }
  });

  // Weights are already in lbs
  const totalLbs = lifts.reduce((sum, l) => sum + (bests[l] || 0), 0);
  const goalLbs = 1000;
  const pct = Math.min(100, Math.round((totalLbs / goalLbs) * 100));

  return `
    <div class="club-tracker">
      <h3>🏆 1000 lb Club Tracker</h3>
      <div class="club-total">${totalLbs} <small>/ ${goalLbs} lbs</small></div>
      <div style="font-size:13px;color:var(--muted);margin-bottom:4px">${pct}% of goal · ${goalLbs - totalLbs} lbs to go</div>
      <div class="club-bar-container">
        <div class="club-bar" style="width:${pct}%"></div>
      </div>
      <div class="club-lifts">
        ${lifts.map(l => {
          const lbs = bests[l] || 0;
          const cls = LIFT_CLASS[l];
          return `
            <div class="club-lift">
              <div class="cl-name" style="color:var(--${cls})">${LIFT_SHORT[l]}</div>
              <div class="cl-weight" style="color:var(--${cls})">${lbs}</div>
              <div class="cl-unit">lbs</div>
            </div>`;
        }).join('')}
      </div>
    </div>`;
}

// --- Charts ---
function renderChartCard(lift) {
  const id = 'chart-' + lift.replace(/\s+/g, '-').toLowerCase();
  const color = LIFT_COLORS[lift];
  return `
    <div class="chart-card">
      <h3 style="color:${color}">${LIFT_SHORT[lift]} Progression</h3>
      <div class="chart-wrap"><canvas id="${id}"></canvas></div>
    </div>`;
}

function initChart(lift) {
  const id = 'chart-' + lift.replace(/\s+/g, '-').toLowerCase();
  const canvas = document.getElementById(id);
  if (!canvas) return;

  const liftData = workouts.filter(w => w.workout.mainLift === lift);
  const labels = liftData.map(d => {
    const dt = new Date(d.date + 'T12:00:00');
    return dt.toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
  });
  const weights = liftData.map(d => d.workout.topWeight);
  const color = LIFT_COLORS[lift];

  // Generate projected future weights from rotation (assumes +5 lb per session)
  const danP = program.dan;
  const currentWeight = danP?.currentWeights?.[lift] || 0;
  const futureLabels = [];
  const futureWeights = [];
  if (currentWeight) {
    for (let i = 1; i <= 6; i++) {
      futureLabels.push('+' + i);
      futureWeights.push(currentWeight + (i * 5));
    }
  }

  const allLabels = [...labels, ...futureLabels];
  
  const datasets = [
    {
      label: 'Top Weight (lbs)',
      data: weights.concat(Array(futureLabels.length).fill(null)),
      borderColor: color,
      backgroundColor: color + '20',
      borderWidth: 2.5,
      pointRadius: 4,
      pointBackgroundColor: color,
      pointBorderColor: '#1a1d27',
      pointBorderWidth: 2,
      tension: 0.3,
      fill: true,
    }
  ];

  if (futureWeights.length) {
    // Connect last actual to first projected
    const projData = Array(labels.length - 1).fill(null);
    projData.push(weights[weights.length - 1]); // overlap point
    datasets.push({
      label: 'Projected',
      data: projData.concat(futureWeights),
      borderColor: color + '60',
      borderWidth: 2,
      borderDash: [6, 4],
      pointRadius: 3,
      pointBackgroundColor: color + '60',
      pointBorderColor: '#1a1d27',
      pointBorderWidth: 1,
      tension: 0.3,
      fill: false,
    });
  }

  if (charts[lift]) charts[lift].destroy();
  charts[lift] = new Chart(canvas, {
    type: 'line',
    data: { labels: allLabels, datasets },
    options: {
      responsive: true,
      maintainAspectRatio: false,
      interaction: { mode: 'index', intersect: false },
      plugins: {
        legend: { display: false },
        tooltip: {
          callbacks: {
            label: ctx => `${ctx.parsed.y} lbs`
          }
        }
      },
      scales: {
        x: {
          ticks: { color: '#71717a', maxTicksLimit: 8, font: { size: 11 } },
          grid: { color: 'rgba(42, 45, 58, 0.5)' },
        },
        y: {
          ticks: { color: '#71717a', font: { size: 11 }, callback: v => v + ' lbs' },
          grid: { color: 'rgba(42, 45, 58, 0.5)' },
        }
      }
    }
  });
}

// --- Recent Table ---
function renderRecentTable() {
  const recent = workouts.slice(-10).reverse();
  if (!recent.length) return '';

  const rows = recent.map(w => {
    const d = w.workout;
    // Find accessory & finisher from sets
    const mainExercise = d.mainLift;
    const otherExercises = [...new Set(d.sets.filter(s => s.exercise !== mainExercise).map(s => s.exercise))];
    const accessory = otherExercises[0] || '—';
    const finisher = otherExercises[1] || '—';

    return `<tr>
      <td>${w.date}</td>
      <td>${liftBadge(d.mainLift)}</td>
      <td style="font-weight:600"><a href="${warmupUrl(d.mainLift, d.topWeight, program.dan?.inventory)}" target="_blank" style="color:var(--text);text-decoration:none;border-bottom:1px dashed var(--muted)">${d.topWeight} lbs</a></td>
      <td>${accessory}</td>
      <td>${finisher}</td>
    </tr>`;
  }).join('');

  return `
    <div class="recent-table">
      <h3>📋 Recent Workouts</h3>
      <table>
        <thead><tr><th>Date</th><th>Main Lift</th><th>Top Weight</th><th>Accessory</th><th>Finisher</th></tr></thead>
        <tbody>${rows}</tbody>
      </table>
    </div>`;
}

// --- Rotation Status ---
function renderRotation() {
  const danP = program.dan;
  const ewaP = program.ewa;
  if (!danP) return '';

  const danNext = getNextWorkout('dan');
  const ewaNext = getNextWorkout('ewa');

  function renderList(items, lastIdx, nextIdx) {
    return items.map((item, i) => {
      const name = typeof item === 'string' ? item : item.name;
      const isLast = i === lastIdx;
      const isNext = i === nextIdx;
      const cls = isLast ? 'current' : isNext ? 'next' : 'done';
      const dotCls = isLast ? 'current' : isNext ? 'next' : 'done';
      let tag = '';
      if (isLast) tag = '<span class="rotation-tag last">LAST</span>';
      if (isNext) tag = '<span class="rotation-tag next">NEXT</span>';
      return `<div class="rotation-item ${cls}">
        <div class="rotation-dot ${dotCls}"></div>
        ${name}
        ${tag}
      </div>`;
    }).join('');
  }

  return `
    <div class="rotation-section">
      <h3>🔄 Dan's Exercise Rotation</h3>
      <div class="rotation-grid">
        <div class="rotation-col">
          <h4>Accessories (${danP.protocol.accessorySets})</h4>
          ${renderList(danP.accessories, danP.lastCompleted.accessoryIndex, danNext?.indices.acc)}
        </div>
        <div class="rotation-col">
          <h4>Finishers (${danP.protocol.finisherSets})</h4>
          ${renderList(danP.finishers, danP.lastCompleted.finisherIndex, danNext?.indices.fin)}
        </div>
      </div>
    </div>
    ${ewaP ? `
    <div class="rotation-section">
      <h3>🔄 Ewa's Exercise Rotation</h3>
      <div class="rotation-grid">
        <div class="rotation-col">
          <h4>Accessories (${ewaP.protocol.accessorySets})</h4>
          ${renderList(ewaP.accessories, ewaP.lastCompleted.accessoryIndex, ewaNext?.indices.acc)}
        </div>
        <div class="rotation-col">
          <h4>Finishers (${ewaP.protocol.finisherSets})</h4>
          ${renderList(ewaP.finishers, ewaP.lastCompleted.finisherIndex, ewaNext?.indices.fin)}
        </div>
      </div>
    </div>` : ''}`;
}

// Init
loadAll();
</script>
</body>
</html>
