<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Body Composition Tracker</title>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4"></script>
<script src="https://cdn.jsdelivr.net/npm/chartjs-plugin-annotation@3"></script>
<style>
  :root {
    --bg: #0f1117;
    --card: #1a1d27;
    --border: #2a2d3a;
    --text: #e4e4e7;
    --muted: #71717a;
    --accent: #6366f1;
    --accent2: #22d3ee;
    --green: #22c55e;
    --red: #ef4444;
    --yellow: #eab308;
    --orange: #f97316;
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
    background: var(--bg);
    color: var(--text);
    min-height: 100vh;
    padding: 8px;
  }
  .controls { display: flex; gap: 8px; align-items: center; }
  .controls select, .controls button {
    background: var(--card);
    color: var(--text);
    border: 1px solid var(--border);
    padding: 8px 14px;
    border-radius: 8px;
    font-size: 13px;
    cursor: pointer;
  }
  .controls button:hover { border-color: var(--accent); }
  .controls button.active { background: var(--accent); border-color: var(--accent); }

  .grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 16px;
    margin-bottom: 24px;
  }
  .stat-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .stat-card .label {
    font-size: 12px;
    color: var(--muted);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    margin-bottom: 8px;
  }
  .stat-card .value {
    font-size: 28px;
    font-weight: 700;
    font-variant-numeric: tabular-nums;
  }
  .stat-card .detail {
    font-size: 13px;
    color: var(--muted);
    margin-top: 4px;
  }
  .stat-card .change {
    font-size: 13px;
    margin-top: 6px;
    font-weight: 600;
  }
  .stat-card .change.down { color: var(--green); }
  .stat-card .change.up { color: var(--red); }
  .stat-card .change.neutral { color: var(--muted); }

  .progress-bar-container {
    margin-top: 12px;
    background: var(--bg);
    border-radius: 6px;
    height: 8px;
    overflow: hidden;
  }
  .progress-bar {
    height: 100%;
    border-radius: 6px;
    transition: width 0.5s ease;
  }

  .charts-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 16px;
    margin-bottom: 24px;
  }
  .chart-card {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
  }
  .chart-card.full { grid-column: 1 / -1; }
  .chart-card h3 {
    font-size: 15px;
    font-weight: 600;
    margin-bottom: 16px;
  }
  .chart-wrap { position: relative; height: 300px; }
  .chart-wrap.tall { height: 400px; }

  .projections {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .projections h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .milestone {
    display: flex;
    align-items: center;
    padding: 12px 0;
    border-bottom: 1px solid var(--border);
  }
  .milestone:last-child { border-bottom: none; }
  .milestone .icon { font-size: 20px; margin-right: 12px; }
  .milestone .info { flex: 1; }
  .milestone .target { font-weight: 600; }
  .milestone .eta { color: var(--muted); font-size: 13px; }
  .milestone .date {
    font-weight: 600;
    font-size: 14px;
    color: var(--accent2);
  }

  .log-form {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    margin-bottom: 24px;
  }
  .log-form h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  .form-row { display: flex; gap: 12px; flex-wrap: wrap; align-items: end; }
  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; }
  .form-group input {
    background: var(--bg);
    border: 1px solid var(--border);
    color: var(--text);
    padding: 10px 14px;
    border-radius: 8px;
    font-size: 14px;
    width: 130px;
    font-variant-numeric: tabular-nums;
  }
  .form-group input:focus { outline: none; border-color: var(--accent); }
  .form-group input[type="date"] { width: 160px; }
  .form-separator {
    width: 100%;
    height: 0;
    border: none;
    border-top: 1px solid var(--border);
    margin: 4px 0;
    opacity: 0.5;
  }
  .form-section-label {
    font-size: 11px;
    color: var(--accent2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
    align-self: end;
    padding-bottom: 12px;
    font-weight: 600;
  }
  .btn-log {
    background: var(--accent);
    color: white;
    border: none;
    padding: 10px 24px;
    border-radius: 8px;
    font-size: 14px;
    font-weight: 600;
    cursor: pointer;
    height: fit-content;
  }
  .btn-log:hover { opacity: 0.9; }
  .toast {
    position: fixed;
    bottom: 24px;
    right: 24px;
    background: var(--green);
    color: white;
    padding: 12px 20px;
    border-radius: 8px;
    font-weight: 600;
    transform: translateY(80px);
    opacity: 0;
    transition: all 0.3s ease;
  }
  .toast.show { transform: translateY(0); opacity: 1; }

  .recent-table {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: 12px;
    padding: 20px;
    overflow-x: auto;
  }
  .recent-table h3 { font-size: 15px; font-weight: 600; margin-bottom: 16px; }
  table { width: 100%; border-collapse: collapse; font-size: 13px; }
  th { text-align: left; color: var(--muted); font-weight: 500; padding: 8px 12px; border-bottom: 1px solid var(--border); text-transform: uppercase; font-size: 11px; letter-spacing: 0.5px; }
  td { padding: 10px 12px; border-bottom: 1px solid var(--border); font-variant-numeric: tabular-nums; }
  tr:last-child td { border-bottom: none; }
  tr:hover td { background: rgba(99, 102, 241, 0.05); }
  .photo-indicator { cursor: pointer; font-size: 16px; transition: transform 0.15s; display: inline-block; }
  .photo-indicator:hover { transform: scale(1.3); }

  /* Photo Modal */
  .photo-overlay {
    display: none; position: fixed; inset: 0; background: rgba(0,0,0,0.92);
    z-index: 2000; overflow-y: auto; padding: 24px;
  }
  .photo-overlay.open { display: flex; flex-direction: column; align-items: center; }
  .photo-overlay .close-btn {
    position: fixed; top: 16px; right: 24px; background: none; border: none;
    color: white; font-size: 32px; cursor: pointer; z-index: 2001;
  }
  .photo-overlay .close-btn:hover { color: var(--accent); }
  .photo-modal-header {
    text-align: center; margin-bottom: 24px; width: 100%;
  }
  .photo-modal-header h2 { font-size: 22px; margin-bottom: 8px; }
  .photo-modal-header .subtitle { color: var(--muted); font-size: 14px; }
  .photo-date-nav {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 24px; flex-wrap: wrap;
  }
  .photo-date-nav button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 8px 16px; border-radius: 8px; cursor: pointer; font-size: 13px;
  }
  .photo-date-nav button:hover { border-color: var(--accent); }
  .photo-date-nav button.active { background: var(--accent); border-color: var(--accent); }
  .photo-compare-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 24px; max-width: 1200px; width: 100%;
  }
  .photo-compare-col { text-align: center; }
  .photo-compare-col h3 { font-size: 15px; margin-bottom: 12px; color: var(--accent2); }
  .photo-compare-col img {
    width: 100%; max-width: 400px; border-radius: 8px; border: 1px solid var(--border);
    margin-bottom: 8px;
  }
  .photo-view-label { font-size: 12px; color: var(--muted); text-transform: uppercase; letter-spacing: 0.5px; margin-bottom: 8px; }
  .photo-view-tabs {
    display: flex; gap: 8px; justify-content: center; margin-bottom: 16px;
  }
  .photo-view-tabs button {
    background: var(--card); color: var(--text); border: 1px solid var(--border);
    padding: 6px 14px; border-radius: 6px; cursor: pointer; font-size: 12px;
  }
  .photo-view-tabs button:hover { border-color: var(--accent); }
  .photo-view-tabs button.active { background: var(--accent); border-color: var(--accent); }

  @media (max-width: 900px) {
    .grid { grid-template-columns: repeat(2, 1fr); }
    .charts-grid { grid-template-columns: 1fr; }
  }
  @media (max-width: 600px) {
    body { padding: 12px; }
    .grid { grid-template-columns: 1fr; }
    .form-row { flex-direction: column; }
    .form-group input { width: 100%; }
    .form-separator { display: none; }
    .form-section-label { padding-bottom: 4px; }
    .photo-compare-grid { grid-template-columns: 1fr; }
  }
</style>
</head>
<body>

<div class="controls" style="padding:8px 0;">
    <select id="rangeSelect" onchange="updateDashboard()">
      <option value="30">30 Days</option>
      <option value="60" selected>60 Days</option>
      <option value="90">90 Days</option>
      <option value="0">All Time</option>
    </select>
    <button onclick="toggleSmoothing()" id="smoothBtn">7d Avg</button>
    <button onclick="loadData()" title="Refresh">↻</button>
</div>

<!-- Quick Log -->
<div class="log-form">
  <h3>⚡ Quick Log</h3>
  <div class="form-row">
    <div class="form-group">
      <label>Date</label>
      <input type="date" id="logDate">
    </div>
    <div class="form-group">
      <label>Weight (lbs)</label>
      <input type="number" step="0.1" id="logWeight" placeholder="185.0">
    </div>
    <div class="form-group">
      <label>Body Fat %</label>
      <input type="number" step="0.1" id="logBF" placeholder="18.5">
    </div>
    <div class="form-group">
      <label>Waist (in)</label>
      <input type="number" step="0.1" id="logWaist" placeholder="33.0">
    </div>
    <div class="form-separator"></div>
    <span class="form-section-label">InBody</span>
    <div class="form-group">
      <label>SMM (lbs)</label>
      <input type="number" step="0.1" id="logSMM" placeholder="86.2">
    </div>
    <div class="form-group">
      <label>LBM (lbs)</label>
      <input type="number" step="0.1" id="logLBM" placeholder="150.4">
    </div>
    <div class="form-group">
      <label>BFM (lbs)</label>
      <input type="number" step="0.1" id="logBFM" placeholder="42.1">
    </div>
    <div class="form-group">
      <label>BMI</label>
      <input type="number" step="0.1" id="logBMI" placeholder="24.7">
    </div>
    <div class="form-group">
      <label>InBody Score</label>
      <input type="number" step="1" id="logScore" placeholder="75">
    </div>
    <div class="form-separator"></div>
    <div class="form-group">
      <label>Notes</label>
      <input type="text" id="logNotes" placeholder="Optional" style="width:200px">
    </div>
    <button class="btn-log" onclick="submitLog()">Log Entry</button>
  </div>
</div>

<!-- Stat Cards -->
<div class="grid" id="statCards"></div>

<!-- Photo Progress Card -->
<div id="photoCard" style="display:none" class="chart-card" style="margin-bottom:24px">
  <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:12px">
    <h3>📸 Progress Photos</h3>
    <button onclick="openPhotos()" style="background:var(--accent);color:white;border:none;padding:8px 16px;border-radius:8px;cursor:pointer;font-size:13px;font-weight:600">Compare Photos</button>
  </div>
  <div id="photoTimeline" style="display:flex;gap:12px;flex-wrap:wrap"></div>
</div>

<!-- Charts -->
<div class="charts-grid">
  <div class="chart-card full">
    <h3>Weight & Body Fat Over Time</h3>
    <div class="chart-wrap tall"><canvas id="mainChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Body Composition (Lean vs Fat)</h3>
    <div class="chart-wrap"><canvas id="compChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Muscle & Fat Mass (InBody)</h3>
    <div class="chart-wrap"><canvas id="inbodyChart"></canvas></div>
  </div>
  <div class="chart-card">
    <h3>Weekly Rate of Change</h3>
    <div class="chart-wrap"><canvas id="rateChart"></canvas></div>
  </div>
</div>

<!-- Projections -->
<div class="projections" id="projections">
  <h3>🔮 Milestone Projections</h3>
  <div id="milestoneList"></div>
</div>

<!-- Recent Entries -->
<div class="recent-table">
  <h3>📋 Recent Entries</h3>
  <table>
    <thead><tr><th>Date</th><th>Weight</th><th>BF%</th><th>SMM</th><th>LBM</th><th>BFM</th><th>BMI</th><th>Score</th><th>Waist</th><th>Δ Weight</th><th>Notes</th></tr></thead>
    <tbody id="tableBody"></tbody>
  </table>
</div>

<!-- Photo Comparison Modal -->
<div class="photo-overlay" id="photoOverlay">
  <button class="close-btn" onclick="closePhotos()">&times;</button>
  <div class="photo-modal-header">
    <h2>📸 Progress Photos</h2>
    <div class="subtitle" id="photoSubtitle">Compare to Day 1</div>
  </div>
  <div class="photo-date-nav" id="photoDateNav"></div>
  <div class="photo-view-tabs" id="photoViewTabs"></div>
  <div class="photo-compare-grid" id="photoCompareGrid"></div>
</div>

<div class="toast" id="toast">✅ Entry saved!</div>

<script>
// State
let allData = [];
let showSmoothed = true;
let charts = {};

// Data loading — tries fetch first (if served), falls back to embedded/localStorage
async function loadData() {
  // Resolve base path from current URL (handles /bodycomp prefix from Tailscale serve)
  const basePath = '/';
  // Try loading from data/ directory via fetch (works with local server)
  try {
    const resp = await fetch(`/bodycomp-data/index.json`);
    if (resp.ok) {
      const files = await resp.json();
      const entries = [];
      for (const f of files) {
        try {
          const r = await fetch(`/bodycomp-data/${f}`);
          if (r.ok) entries.push(await r.json());
        } catch(e) {}
      }
      if (entries.length > 0) {
        allData = entries.filter(e => e && e.date).sort((a, b) => a.date.localeCompare(b.date));
        saveToStorage();
        updateDashboard();
        return;
      }
    }
  } catch(e) {}

  // Fallback: localStorage
  const stored = localStorage.getItem('bodycomp_data');
  if (stored) {
    allData = JSON.parse(stored);
  }
  updateDashboard();
}

function saveToStorage() {
  localStorage.setItem('bodycomp_data', JSON.stringify(allData));
}

function submitLog() {
  const date = document.getElementById('logDate').value;
  const weight = parseFloat(document.getElementById('logWeight').value);
  const bf = parseFloat(document.getElementById('logBF').value) || null;
  const waist = parseFloat(document.getElementById('logWaist').value) || null;
  const smm = parseFloat(document.getElementById('logSMM').value) || null;
  const lbm = parseFloat(document.getElementById('logLBM').value) || null;
  const bfm = parseFloat(document.getElementById('logBFM').value) || null;
  const bmi = parseFloat(document.getElementById('logBMI').value) || null;
  const score = parseFloat(document.getElementById('logScore').value) || null;
  const notes = document.getElementById('logNotes').value || '';

  if (!date || !weight) return alert('Date and weight are required');

  // Find or create entry
  let entry = allData.find(d => d.date === date);
  if (!entry) {
    entry = { date, weight: null, bf: null, measurements: {}, photos: [], notes: '' };
    allData.push(entry);
  }

  entry.weight = weight;
  if (bf) entry.bf = bf;
  if (waist) {
    if (!entry.measurements) entry.measurements = {};
    entry.measurements.waist = waist;
  }
  if (smm) entry.smm = smm;
  if (lbm) entry.lbm = lbm;
  if (bfm) entry.bfm = bfm;
  if (bmi) entry.bmi = bmi;
  if (score) entry.score = score;
  if (notes) entry.notes = notes;
  entry.time = new Date().toISOString();

  allData.sort((a, b) => a.date.localeCompare(b.date));
  saveToStorage();

  // Also try to save to file system (only works with server)
  try {
    const savePath = window.location.pathname.replace(/\/?$/, '/');
    fetch(`/bodycomp-data/${date}.json`, {
      method: 'PUT',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify(entry, null, 2)
    }).catch(() => {});
  } catch(e) {}

  // Show toast
  const toast = document.getElementById('toast');
  toast.classList.add('show');
  setTimeout(() => toast.classList.remove('show'), 2000);

  // Clear form
  document.getElementById('logWeight').value = '';
  document.getElementById('logBF').value = '';
  document.getElementById('logWaist').value = '';
  document.getElementById('logSMM').value = '';
  document.getElementById('logLBM').value = '';
  document.getElementById('logBFM').value = '';
  document.getElementById('logBMI').value = '';
  document.getElementById('logScore').value = '';
  document.getElementById('logNotes').value = '';

  updateDashboard();
}

function toggleSmoothing() {
  showSmoothed = !showSmoothed;
  document.getElementById('smoothBtn').classList.toggle('active', showSmoothed);
  updateDashboard();
}

// Config
const CONFIG = {
  baseline: { weight: 203.9, bf: 25.7, date: '2026-01-02' },
  goals: { bf: 14 }
};

function rollingAvg(arr, window = 7) {
  return arr.map((_, i) => {
    const start = Math.max(0, i - window + 1);
    const slice = arr.slice(start, i + 1).filter(v => v !== null && v !== undefined);
    return slice.length ? slice.reduce((a, b) => a + b, 0) / slice.length : null;
  });
}

function linearRegression(points) {
  const valid = points.filter(p => p.y !== null);
  const n = valid.length;
  if (n < 2) return null;
  const sumX = valid.reduce((a, p) => a + p.x, 0);
  const sumY = valid.reduce((a, p) => a + p.y, 0);
  const sumXY = valid.reduce((a, p) => a + p.x * p.y, 0);
  const sumXX = valid.reduce((a, p) => a + p.x * p.x, 0);
  const denom = n * sumXX - sumX * sumX;
  if (denom === 0) return null;
  const slope = (n * sumXY - sumX * sumY) / denom;
  const intercept = (sumY - slope * sumX) / n;
  return { slope, intercept };
}

function getFilteredData() {
  const range = parseInt(document.getElementById('rangeSelect').value);
  if (range === 0) return allData;
  const cutoff = new Date();
  cutoff.setDate(cutoff.getDate() - range);
  return allData.filter(d => new Date(d.date) >= cutoff);
}

function updateDashboard() {
  const data = getFilteredData();
  if (!data.length) {
    document.getElementById('statCards').innerHTML = '<div class="stat-card" style="grid-column:1/-1;text-align:center;padding:40px"><div class="value" style="font-size:18px">No data yet</div><div class="detail">Use the Quick Log above or CLI: <code>bodycomp log 190 22</code></div></div>';
    return;
  }

  updateStatCards(data);
  updateMainChart(data);
  updateCompChart(data);
  updateInBodyChart(data);
  updateRateChart(data);
  updateProjections(data);
  updateTable(data);
  updatePhotoTimeline(data);
}

function updateStatCards(data) {
  const latest = data[data.length - 1];
  const baseline = CONFIG.baseline;
  const goals = CONFIG.goals;

  // Weight card (no weight goal — goal is 14% BF at highest scale weight)
  const wChange = baseline.weight - (latest.weight || baseline.weight);

  // Weight change from previous
  const prevW = data.length > 1 ? data[data.length - 2] : null;
  const wDelta = prevW && prevW.weight && latest.weight ? (latest.weight - prevW.weight).toFixed(1) : null;

  // BF card
  const bfLost = baseline.bf - (latest.bf || baseline.bf);
  const bfTotal = baseline.bf - goals.bf;
  const bfPct = Math.max(0, Math.min(100, Math.round((bfLost / bfTotal) * 100)));

  // Lean & fat mass — prefer InBody direct values
  const fat = latest.bfm || (latest.weight && latest.bf ? (latest.weight * latest.bf / 100).toFixed(1) : null);
  const lean = latest.lbm || latest.smm || (latest.weight && latest.bf ? (latest.weight * (1 - latest.bf / 100)).toFixed(1) : null);
  const leanLabel = latest.lbm ? 'LBM' : latest.smm ? 'SMM' : 'lean';

  // Weekly rate (last 14 days)
  const recent14 = data.filter(d => d.weight).slice(-14);
  let weeklyRate = null;
  if (recent14.length >= 4) {
    const first = recent14[0];
    const last = recent14[recent14.length - 1];
    const days = (new Date(last.date) - new Date(first.date)) / 86400000;
    if (days > 0) weeklyRate = ((last.weight - first.weight) / days * 7).toFixed(2);
  }

  // SMM change from previous
  const smmDelta = prevW && prevW.smm && latest.smm ? (latest.smm - prevW.smm).toFixed(1) : null;
  const smmBaseline = null; // No InBody baseline data for first entry

  // InBody Score change from previous
  const scoreDelta = prevW && prevW.score && latest.score ? (latest.score - prevW.score).toFixed(0) : null;

  // BFM detail for body fat card
  const bfmDetail = latest.bfm ? `Fat mass: ${latest.bfm} lbs` : (latest.weight && latest.bf ? `Fat mass: ${(latest.weight * latest.bf / 100).toFixed(1)} lbs (calc)` : '');

  const cards = `
    <div class="stat-card">
      <div class="label">Current Weight</div>
      <div class="value">${latest.weight || '—'} <small style="font-size:14px;color:var(--muted)">lbs</small></div>
      ${wDelta ? `<div class="change ${parseFloat(wDelta) < 0 ? 'down' : parseFloat(wDelta) > 0 ? 'up' : 'neutral'}">${parseFloat(wDelta) > 0 ? '+' : ''}${wDelta} lbs</div>` : ''}
      <div class="detail">${wChange > 0 ? '-' : '+'}${Math.abs(wChange).toFixed(1)} lbs from baseline</div>
    </div>
    <div class="stat-card">
      <div class="label">Body Fat</div>
      <div class="value">${latest.bf || '—'}<small style="font-size:14px;color:var(--muted)">%</small></div>
      <div class="detail">Goal: ${goals.bf}% (${latest.bf ? (latest.bf - goals.bf).toFixed(1) : '—'}% to go)</div>

function updateProjections(data) {
  const withWeight = data.filter(d => d.weight);
  if (withWeight.length < 7) {
    document.getElementById('milestoneList').innerHTML = '<div class="milestone"><div class="info"><div class="target">Need at least 7 data points for projections</div></div></div>';
    return;
  }

  const firstDate = new Date(withWeight[0].date);
  const wPoints = withWeight.map(d => ({
    x: (new Date(d.date) - firstDate) / 86400000,
    y: d.weight
  }));
  const wReg = linearRegression(wPoints);

  const bfEntries = withWeight.filter(d => d.bf);
  const bfPoints = bfEntries.length >= 5 ? bfEntries.map(d => ({
    x: (new Date(d.date) - firstDate) / 86400000,
    y: d.bf
  })) : null;
  const bfReg = bfPoints ? linearRegression(bfPoints) : null;

  const current = withWeight[withWeight.length - 1];
  let html = '';

  const bfMilestones = [20, 18, 16, CONFIG.goals.bf];

  if (bfReg && bfReg.slope < 0 && current.bf) {
    html += `<div class="milestone"><div class="icon">📉</div><div class="info"><div class="target">BF% rate: ${(bfReg.slope * 7).toFixed(2)}%/week</div></div></div>`;

    bfMilestones.forEach(target => {
      if (current.bf > target) {
        const daysNeeded = Math.ceil((current.bf - target) / Math.abs(bfReg.slope));
        const date = new Date();
        date.setDate(date.getDate() + daysNeeded);
        const isGoal = target === CONFIG.goals.bf;
        html += `
          <div class="milestone">
            <div class="icon">${isGoal ? '🎯' : '📐'}</div>
            <div class="info">
              <div class="target">${target}% BF ${isGoal ? '(GOAL)' : ''}</div>
              <div class="eta">${daysNeeded} days (${Math.round(daysNeeded / 7)} weeks)</div>
            </div>
            <div class="date">${date.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' })}</div>
          </div>`;
      }
    });
  }

  document.getElementById('milestoneList').innerHTML = html || '<div class="milestone"><div class="info"><div class="target">Not enough BF% data for projections</div></div></div>';
}

// ==================== PHOTO COMPARISON ====================
let photoState = { selectedDate: null, selectedView: 'front' };

function getPhotoDates() {
  return allData.filter(d => d.photos && d.photos.length > 0).map(d => d.date).sort();
}

function getPhotoViews(date) {
  const entry = allData.find(d => d.date === date);
  if (!entry || !entry.photos) return [];
  return entry.photos.map(p => {
    const filename = p.split('/').pop().replace('.jpg', '').replace('.png', '');
    return { path: p, view: filename };
  });
}

function openPhotos(date) {
  photoState.selectedDate = date || getPhotoDates().slice(-1)[0] || DAY1_DATE;

  // Build date navigation
  const dates = getPhotoDates();
  const nav = document.getElementById('photoDateNav');
  nav.innerHTML = dates.map(d => {
    const label = d === DAY1_DATE ? 'Day 1' : new Date(d + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' });
    return `<button class="${d === photoState.selectedDate ? 'active' : ''}" onclick="switchPhotoDate('${d}')">${label}</button>`;
  }).join('');

  // Build view tabs based on current date's photos
  updatePhotoViewTabs();
  renderPhotoComparison();

  document.getElementById('photoOverlay').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function closePhotos() {
  document.getElementById('photoOverlay').classList.remove('open');
  document.body.style.overflow = '';
}

function switchPhotoDate(date) {
  photoState.selectedDate = date;
  // Update nav active state
  document.querySelectorAll('#photoDateNav button').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.includes(date === DAY1_DATE ? 'Day 1' : new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'short', day: 'numeric' })));
  });
  updatePhotoViewTabs();
  renderPhotoComparison();
}

function updatePhotoViewTabs() {
  const views = getPhotoViews(photoState.selectedDate);
  // Also get day1 views for intersection
  const day1Views = getPhotoViews(DAY1_DATE);
  const allViews = [...new Set([...views.map(v => v.view), ...day1Views.map(v => v.view)])];

  // Pick a valid view
  if (!allViews.includes(photoState.selectedView)) {
    photoState.selectedView = allViews[0] || 'front';
  }

  const tabs = document.getElementById('photoViewTabs');
  tabs.innerHTML = allViews.map(v => {
    const label = v.charAt(0).toUpperCase() + v.slice(1).replace('-', ' ');
    return `<button class="${v === photoState.selectedView ? 'active' : ''}" onclick="switchPhotoView('${v}')">${label}</button>`;
  }).join('');
}

function switchPhotoView(view) {
  photoState.selectedView = view;
  document.querySelectorAll('#photoViewTabs button').forEach(btn => {
    btn.classList.toggle('active', btn.textContent.toLowerCase().replace(' ', '-') === view);
  });
  renderPhotoComparison();
}

function renderPhotoComparison() {
  const grid = document.getElementById('photoCompareGrid');
  const basePath = '/';
  const date = photoState.selectedDate;
  const view = photoState.selectedView;

  const day1Photos = getPhotoViews(DAY1_DATE);
  const currentPhotos = getPhotoViews(date);

  const day1Photo = day1Photos.find(p => p.view === view);
  const currentPhoto = currentPhotos.find(p => p.view === view);

  const day1Label = 'Day 1 — Jan 2';
  const currentLabel = date === DAY1_DATE ? 'Day 1' : new Date(date + 'T12:00:00').toLocaleDateString('en-US', { month: 'long', day: 'numeric' });

  // Calculate days between
  const daysBetween = Math.round((new Date(date) - new Date(DAY1_DATE)) / 86400000);
  document.getElementById('photoSubtitle').textContent = date === DAY1_DATE
    ? 'Day 1 baseline photos'
    : `${daysBetween} days of progress`;

  if (date === DAY1_DATE) {
    // Just show day 1 photos, no comparison
    grid.innerHTML = `
      <div class="photo-compare-col" style="grid-column: 1 / -1; display: flex; flex-wrap: wrap; gap: 16px; justify-content: center;">
        ${day1Photos.map(p => `
          <div style="text-align:center">
            <div class="photo-view-label">${p.view}</div>
            <img src="${basePath}${p.path}" alt="${p.view}">
          </div>
        `).join('')}
      </div>`;
  } else {
    grid.innerHTML = `
      <div class="photo-compare-col">
        <h3>${day1Label}</h3>
        ${day1Photo ? `<img src="${basePath}${day1Photo.path}" alt="Day 1 ${view}">` : '<div style="color:var(--muted);padding:40px">No ${view} photo for Day 1</div>'}
      </div>
      <div class="photo-compare-col">
        <h3>${currentLabel}</h3>
        ${currentPhoto ? `<img src="${basePath}${currentPhoto.path}" alt="${currentLabel} ${view}">` : `<div style="color:var(--muted);padding:40px">No ${view} photo for this date</div>`}
      </div>`;
  }
}

// Close on Escape
document.addEventListener('keydown', e => { if (e.key === 'Escape') closePhotos(); });

// Init
document.getElementById('logDate').valueAsDate = new Date();
document.getElementById('smoothBtn').classList.add('active');
loadData();
</script>
